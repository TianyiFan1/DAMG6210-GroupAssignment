# ============================================================================
# CoHabitant CI — GitHub Actions
# ============================================================================
# Runs on every push and PR to main/develop.
#
# Pipeline:
#   1. Syntax check     — compile all .py files (catches SyntaxError)
#   2. Unit tests       — pytest on pure-logic modules (financial_math, db helpers, auth, state)
#   3. Gemini mock tests— API mocking tests (no live endpoints)
#   4. Security guard   — .gitignore protects secrets
#   5. Smoke import     — verify every page module imports without crash
#
# Integration tests (test_db_integration_readonly.py) are SKIPPED in CI
# because they require a live SQL Server instance. They run locally via
# `pytest -m "not ci_skip"` against your dev database.
# ============================================================================

name: CoHabitant CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch (saves Actions minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: streamlit_app

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── Cache pip packages ──
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('streamlit_app/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      # ── Install ODBC driver (required for pyodbc import, even if DB isn't used) ──
      - name: Install Microsoft ODBC Driver 17
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor --yes --batch | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/$(lsb_release -rs)/prod $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 unixodbc-dev

      # ── Install Python dependencies ──
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Create dummy secrets.toml (required by security config tests) ──
      - name: Create test secrets template
        run: |
          mkdir -p .streamlit
          cp .streamlit/secrets.toml.template .streamlit/secrets.toml
          # Ensure the template file exists for security tests

      # ── Run test suite ──
      - name: Run pytest
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_db_integration_readonly.py \
            --ignore=tests/test_ui_e2e_smoke.py \
            -v \
            --tb=short \
            --strict-markers \
            -x
        env:
          # Prevent Streamlit from trying to open a browser
          STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
          STREAMLIT_SERVER_HEADLESS: "true"

      # ── Syntax smoke check (all .py files compile) ──
      - name: Verify all Python files parse
        run: |
          python -m py_compile app.py
          for f in pages/*.py utils/*.py; do
            python -m py_compile "$f"
          done

  # ── Docker build verification ──
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t cohabitant:ci-${{ github.sha }} \
            -f streamlit_app/Dockerfile \
            streamlit_app/

      - name: Verify container starts
        run: |
          docker run -d \
            --name cohabitant-ci \
            -p 8501:8501 \
            cohabitant:ci-${{ github.sha }}
          sleep 10
          curl -f http://localhost:8501/_stcore/health || exit 1
          docker stop cohabitant-ci
